name: Build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: gobuild-test-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: gobuild-test-${{ runner.os }}-
      - name: Test + vet
        run: |
          go vet ./... &
          go test -race -count=1 ./...
          wait

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: android
            goarch: arm64
          - goos: android
            goarch: arm
            goarm: '7'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: gobuild-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: gobuild-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Install UPX
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y upx-ucl

      # Embed PE version info into the Windows .exe so AV heuristics
      # don't flag unsigned Go binaries.
      - name: Generate Windows PE resources
        if: matrix.goos == 'windows'
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          VERSION=${GITHUB_REF_NAME:-dev}
          VER_NUM="${VERSION#v}"
          NUM_ONLY=$(echo "$VER_NUM" | grep -oE '^[0-9]+(\.[0-9]+)*' || echo "0.0.0")
          V_MAJ=$(echo "$NUM_ONLY" | awk -F. '{print $1+0}')
          V_MIN=$(echo "$NUM_ONLY" | awk -F. '{print $2+0}')
          V_PATCH=$(echo "$NUM_ONLY" | awk -F. '{print $3+0}')
          for d in cmd/server cmd/client; do
            (cd "$d" && goversioninfo \
              -ver-major="$V_MAJ" \
              -ver-minor="$V_MIN" \
              -ver-patch="$V_PATCH" \
              -product-version="$VER_NUM" \
              -file-version="$VER_NUM" \
              -o resource_windows_amd64.syso \
              versioninfo.json)
          done

      - name: Build Server
        if: matrix.goos != 'android'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/sartoopjj/thescanner/internal/version.Version=${VERSION} -X github.com/sartoopjj/thescanner/internal/version.Commit=${COMMIT} -X github.com/sartoopjj/thescanner/internal/version.Date=${DATE}"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags="${LDFLAGS}" -o build/thescanner-server-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./cmd/server

      - name: Build Client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ext=""
          BUILD_MODE=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          LDFLAGS="-s -w -X github.com/sartoopjj/thescanner/internal/version.Version=${VERSION} -X github.com/sartoopjj/thescanner/internal/version.Commit=${COMMIT} -X github.com/sartoopjj/thescanner/internal/version.Date=${DATE}"
          if [ "${{ matrix.goos }}" = "android" ]; then
            BUILD_MODE="-buildmode=pie"
            LDFLAGS="${LDFLAGS} -extldflags=-Wl,-z,max-page-size=16384"
          fi
          # Android: cgo via NDK clang so DNS goes through bionic libc.
          if [ "${{ matrix.goos }}" = "android" ]; then
            export CGO_ENABLED=1
            case "${{ matrix.goarch }}" in
              arm)
                export CC="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang"
                ;;
              arm64)
                export CC="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang"
                ;;
            esac
            test -x "$CC" || { echo "NDK clang not found at $CC"; exit 1; }
          fi
          if [ "${{ matrix.goos }}" = "android" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            out="build/thescanner-client-android-arm64"
          elif [ "${{ matrix.goos }}" = "android" ] && [ "${{ matrix.goarch }}" = "arm" ]; then
            out="build/thescanner-client-android-arm"
          else
            out="build/thescanner-client-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          fi
          go build -trimpath -buildvcs=false $BUILD_MODE -ldflags="${LDFLAGS}" -o "$out" ./cmd/client

      # UPX skipped on Windows (triggers AV heuristics). Linux only.
      - name: Compress with UPX
        if: matrix.goos == 'linux'
        run: |
          find build -maxdepth 1 -type f -print0 \
            | xargs -0 -n1 -P "$(nproc)" -I{} sh -c 'upx --best --lzma "$1" || true' _ {}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/

  android-apk:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gomobile
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_NDK_LATEST_HOME}"
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          # Newer gomobile requires golang.org/x/mobile in the module
          # dep graph (not just on PATH). Ensure it's present and
          # go.sum is fresh before invoking gomobile bind.
          go get golang.org/x/mobile/bind
          go mod tidy
          gomobile init

      - name: Build gomobile AAR
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_NDK_LATEST_HOME}"
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # -s -w  strip symbol + DWARF debug tables (~20% .so shrink)
          # -trimpath (passed via gomobile flag below) replaces build-host
          # paths with go-module-relative paths — both shrinks the binary
          # and makes builds reproducible.
          LDFLAGS="-s -w -X github.com/sartoopjj/thescanner/internal/version.Version=${VERSION} -X github.com/sartoopjj/thescanner/internal/version.Commit=${COMMIT} -X github.com/sartoopjj/thescanner/internal/version.Date=${DATE} -extldflags=-Wl,-z,max-page-size=16384"
          mkdir -p android/app/libs
          gomobile bind -target=android/arm,android/arm64,android/386,android/amd64 -androidapi 24 \
            -trimpath \
            -ldflags="${LDFLAGS}" -o android/app/libs/scanner.aar ./mobile

      # Hard-fail when ANY of the four signing secrets are missing. The
      # previous behaviour fell back to debug signing, which produces an
      # APK with a different signing key than the release stream — every
      # user has to uninstall before the update will install ("App not
      # installed" / "App conflict"). Refusing to build is strictly
      # better than shipping an unusable update.
      - name: Verify signing secrets are configured
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$KEYSTORE_BASE64"   ] && missing+=("KEYSTORE_BASE64")
          [ -z "$KEYSTORE_PASSWORD" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "$KEY_ALIAS"         ] && missing+=("KEY_ALIAS")
          [ -z "$KEY_PASSWORD"      ] && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets → Actions before pushing release tags."
            echo "Building without them would ship a debug-signed APK that conflicts with existing installs."
            exit 1
          fi
          echo "All four signing secrets present."

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/thescanner.jks
          if [ ! -s android/app/thescanner.jks ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_BASE64 is malformed."
            exit 1
          fi
          # Quick sanity check: keytool should be able to read it with
          # the configured password. Failing here is way clearer than
          # a 200-line Gradle traceback later.
          if ! keytool -list -keystore android/app/thescanner.jks \
                       -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
                       -alias "${{ secrets.KEY_ALIAS }}" >/dev/null 2>&1; then
            echo "::error::Keystore + password + alias don't match. Check KEYSTORE_PASSWORD and KEY_ALIAS."
            exit 1
          fi
          echo "Keystore decoded and verified."

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stage artifacts dir
        run: mkdir -p artifacts

      - name: Build Android APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:        ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:     ${{ secrets.KEY_PASSWORD }}
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          if [ ! -x ./gradlew ]; then gradle wrapper --gradle-version 8.10.2; fi

          # Hard-require the keystore on disk. The "Verify signing
          # secrets" + "Decode signing keystore" steps above already
          # bailed out if anything was missing, so by this point the
          # file MUST exist. If it doesn't, the previous fallback to
          # debug-signed would silently break the update-in-place
          # contract — fail loudly instead.
          if [ ! -f app/thescanner.jks ]; then
            echo "::error::app/thescanner.jks missing despite secrets being verified."
            exit 1
          fi

          # Pass 1 — per-ABI split APKs (release-signed, never debug).
          ./gradlew --no-daemon --build-cache --stacktrace assembleRelease

          APK_DIR=app/build/outputs/apk/release
          cp "$APK_DIR"/app-arm64-v8a-release.apk    ../artifacts/thescanner-android-${VERSION}-arm64-v8a.apk
          cp "$APK_DIR"/app-armeabi-v7a-release.apk  ../artifacts/thescanner-android-${VERSION}-armeabi-v7a.apk
          cp "$APK_DIR"/app-x86-release.apk          ../artifacts/thescanner-android-${VERSION}-x86.apk
          cp "$APK_DIR"/app-x86_64-release.apk       ../artifacts/thescanner-android-${VERSION}-x86_64.apk

          # Pass 2 — universal APK.
          ./gradlew --no-daemon --build-cache -PuniversalBuild=true assembleRelease
          cp "$APK_DIR"/app-release.apk              ../artifacts/thescanner-android-${VERSION}-universal.apk

      # Final defense: confirm every produced APK is actually signed
      # with the expected certificate. apksigner verify -v dumps the
      # SHA-256 fingerprint of each signer; the grep step ensures the
      # output mentions a non-debug certificate. This catches the case
      # where the build "succeeds" but Gradle silently produced an
      # unsigned APK due to a misconfigured signingConfig.
      - name: Verify APK signatures
        run: |
          # Find apksigner from the latest build-tools the runner has.
          APKSIGNER="$(find $ANDROID_HOME/build-tools -name apksigner -type f 2>/dev/null | sort -V | tail -1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found in $ANDROID_HOME/build-tools/*"
            exit 1
          fi
          echo "Using $APKSIGNER"
          failed=0
          for apk in artifacts/thescanner-android-*.apk; do
            echo "--- verifying $apk"
            if ! "$APKSIGNER" verify --verbose "$apk"; then
              echo "::error::$apk failed apksigner verification."
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1
          echo "All APKs verified."

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thescanner-android-apk
          path: |
            artifacts/thescanner-android-*-arm64-v8a.apk
            artifacts/thescanner-android-*-armeabi-v7a.apk
            artifacts/thescanner-android-*-x86.apk
            artifacts/thescanner-android-*-x86_64.apk
            artifacts/thescanner-android-*-universal.apk

  ios-ipa:
    needs: test
    # macos-15 ships Xcode 16.x. Required because the project file uses
    # objectVersion = 77 (introduced in Xcode 16 alongside
    # PBXFileSystemSynchronizedRootGroup) which Xcode 15.4 on macos-14
    # rejects as "future Xcode project file format (77)".
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Skip the rest of this job until ios/Thescanner.xcodeproj is
      # committed. hashFiles() isn't valid in a job-level `if:`, so we
      # set an output here and gate every subsequent step on it.
      - name: Check for iOS Xcode project
        id: ios_check
        run: |
          if [ -f ios/Thescanner.xcodeproj/project.pbxproj ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "ios/Thescanner.xcodeproj not in git — skipping iOS IPA build."
          fi

      - uses: actions/setup-go@v5
        if: steps.ios_check.outputs.exists == 'true'
        with:
          go-version: '1.22'
          cache: true

      # Pick the newest Xcode 16+ present on the runner. The default
      # /Applications/Xcode.app symlink on macos-15 already points at
      # Xcode 16.x, but be explicit so a runner-image refresh that
      # changes the default doesn't silently downgrade us below the
      # objectVersion the project needs.
      - name: Select Xcode (16+ required for objectVersion 77)
        if: steps.ios_check.outputs.exists == 'true'
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$XC" ]; then
            XC=/Applications/Xcode.app
          fi
          echo "Using $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Install gomobile + gobind
        if: steps.ios_check.outputs.exists == 'true'
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          # iOS binds need the objc subpackage on top of /bind.
          go get golang.org/x/mobile/bind golang.org/x/mobile/bind/objc
          go mod tidy

      - name: Build Mobile.xcframework
        if: steps.ios_check.outputs.exists == 'true'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-X github.com/sartoopjj/thescanner/internal/version.Version=${VERSION} -X github.com/sartoopjj/thescanner/internal/version.Commit=${COMMIT} -X github.com/sartoopjj/thescanner/internal/version.Date=${DATE}"
          gomobile bind -iosversion=15.0 -target=ios,iossimulator -ldflags="${LDFLAGS}" -o ios/Mobile.xcframework ./mobile

      - name: Archive (unsigned)
        if: steps.ios_check.outputs.exists == 'true'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          MARKETING_VERSION=${VERSION#v}
          BUILD_NUMBER=$(git rev-list --count HEAD)
          xcodebuild \
            -project ios/Thescanner.xcodeproj \
            -scheme Thescanner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Thescanner.xcarchive \
            archive \
            MARKETING_VERSION="${MARKETING_VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Pack unsigned IPA
        if: steps.ios_check.outputs.exists == 'true'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          mkdir -p build/Payload
          cp -r build/Thescanner.xcarchive/Products/Applications/Thescanner.app build/Payload/
          (cd build && zip -qry "thescanner-ios-${VERSION}-unsigned.ipa" Payload)
          ls -lh build/*.ipa

      - name: Upload iOS IPA artifact
        if: steps.ios_check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: thescanner-ios-ipa
          path: build/thescanner-ios-*-unsigned.ipa

  macos-dmg:
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: gobuild-macos-dmg-${{ hashFiles('**/go.sum') }}
          restore-keys: gobuild-macos-dmg-

      - name: Build macOS DMG
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          make mac-dmg VERSION="${VERSION}"
          ls -lh build/thescanner-macos-*.dmg

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: thescanner-macos-dmg
          path: build/thescanner-macos-*.dmg

  release:
    needs: [build, android-apk, ios-ipa, macos-dmg]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          append_body: true
          body: |
            ## Downloads

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Linux | amd64 | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-linux-amd64) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-linux-amd64) |
            | Linux | arm64 | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-linux-arm64) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-linux-arm64) |
            | macOS | amd64 (Intel) | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-darwin-amd64) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-darwin-amd64) |
            | macOS | arm64 (Apple Silicon) | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-darwin-arm64) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-darwin-arm64) |
            | macOS | universal `.dmg` (drag-install, **recommended**) | [thescanner-macos-${{ github.ref_name }}.dmg - مک (نصب با کشیدن، توصیه‌شده)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-macos-${{ github.ref_name }}.dmg) |
            | FreeBSD | amd64 | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-freebsd-amd64) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-freebsd-amd64) |
            | FreeBSD | arm64 | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-freebsd-arm64) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-freebsd-arm64) |
            | Windows | amd64 | [server-سرور](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-server-windows-amd64.exe) / [client-کلاینت](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-client-${{ github.ref_name }}-windows-amd64.exe) |
            | Android | universal (arm64-v8a, armeabi-v7a, x86_64 — **recommended**) | [thescanner-android-${{ github.ref_name }}-universal.apk - اندروید (یونیورسال، توصیه‌شده)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-android-${{ github.ref_name }}-universal.apk) |
            | Android | arm64-v8a (modern phones, smaller) | [thescanner-android-${{ github.ref_name }}-arm64-v8a.apk - اندروید (گوشی‌های جدید)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-android-${{ github.ref_name }}-arm64-v8a.apk) |
            | Android | armeabi-v7a (older 32-bit phones) | [thescanner-android-${{ github.ref_name }}-armeabi-v7a.apk - اندروید (دستگاه‌های قدیمی‌تر)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-android-${{ github.ref_name }}-armeabi-v7a.apk) |
            | Android | x86_64 (Chromebooks, emulators, WSA) | [thescanner-android-${{ github.ref_name }}-x86_64.apk - اندروید (کروم‌بوک، شبیه‌ساز، WSA)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-android-${{ github.ref_name }}-x86_64.apk) |
            | Android | x86 (32-bit Intel, niche) | [thescanner-android-${{ github.ref_name }}-x86.apk - اندروید (اینتل ۳۲ بیت، نادر)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-android-${{ github.ref_name }}-x86.apk) |
            | iOS (unsigned) | universal | [thescanner-ios-${{ github.ref_name }}-unsigned.ipa - آی‌اواس (بدون امضا)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/thescanner-ios-${{ github.ref_name }}-unsigned.ipa) |

            **iOS / iPadOS (preview, iOS 14+):** the `.ipa` is unsigned. Re-sign with your own Apple ID via AltStore / Sideloadly / `xcrun altool` (your own TestFlight). It won't install directly from a download.

            **macOS `.dmg` (preview, macOS 11+):** universal Intel + Apple Silicon, unsigned. First launch: right-click → Open, or `xattr -dr com.apple.quarantine /Applications/Thescanner.app`. CLI users can use the bare `thescanner-server` / `thescanner-client` binaries above.
